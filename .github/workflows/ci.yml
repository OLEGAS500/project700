name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: eim
          POSTGRES_PASSWORD: eim
          POSTGRES_DB: eim_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://eim:eim@localhost:5432/eim_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run test:postgres
      - name: Smoke Merchant remediation QA fixture
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: |
          npm run db:migrate
          npm run seed:merchant-remediation-qa
          npm run seed:merchant-remediation-qa
          npm run cleanup:merchant-remediation-qa
          npm run cleanup:merchant-remediation-qa
      - name: Smoke v0.1 demo acceptance fixture
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: |
          npm run db:migrate
          npm run seed:v01-demo
          npm run seed:v01-demo
          npm run advance:v01-demo:recovering
          npm run advance:v01-demo:recovering
          npm run advance:v01-demo:resolved
          npm run advance:v01-demo:resolved
          npm run cleanup:v01-demo
          npm run cleanup:v01-demo
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
